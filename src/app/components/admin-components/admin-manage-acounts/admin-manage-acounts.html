<div class="user-card card-base">

  <h3 class="user-title">
    {{ user.firstName }} {{ user.lastName }}
  </h3>

  <div class="user-body">

    <div class="permission-label">
      Set Permissions
    </div>

    <div class="button-stack">

      <button
        type="button"
        (click)="setCustomer()"
        [class.active]="newSelectedPermission === 'customer'"
      >
        Customer
      </button>

      <button
        type="button"
        (click)="setEmployee()"
        [class.active]="newSelectedPermission === 'employee'"
      >
        Employee
      </button>

      <button
        type="button"
        (click)="setAdmin()"
        [class.active]="newSelectedPermission === 'admin'"
      >
        Admin
      </button>

    </div>

    <button
      type="button"
      class="confirm-btn"
      (click)="confirmPermissionChange()"
      [class.warn]="savedPermission !== newSelectedPermission"
    >
      Confirm Changes
    </button>

  </div>

</div>
