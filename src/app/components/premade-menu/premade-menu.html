<div class="title font">
  <h2>SOME OF OUR FAVORITES</h2>
</div>

<div class="container">
  <div class="row">
    @for (cake of cakes(); track cake.premade_id) {
      <div class="col-sm-6 col-md-4 col-lg-3 mb-4">
        <div class="card h-100">
          <img [src]="cake.img_path" class="card-img-top" />

          <div class="card-body">
            <h5>{{ cake.name }}</h5>
            <p>Description: {{ cake.description }}</p>
            <p>Price: ${{ cake.price }}</p>

            <button type="button" class="btn btn-primary" (click)="addToOrder(cake)">
              Add To Order
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
