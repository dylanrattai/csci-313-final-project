<div class="card shadow-sm">
  <div class="card-body">
    @if (activeTab() === 'account') {
      <div class="container-fluid px-0">
        <div class="mb-4">
          <h2 class="h5 mb-3">Account Details</h2>
          <app-account [initialData]="user()" />
        </div>

        <div>
          <h2 class="h5 mb-3">Change Password</h2>
          <app-change-password [initialData]="user()" />
        </div>
      </div>
    } @else if (activeTab() === 'addresses') {
      <app-addresses></app-addresses>
    } @else if (activeTab() === 'orders') {
      <app-orders></app-orders>
    } @else if (activeTab() === 'logout') {
      <h2 class="h5 mb-3 text-danger">Logout</h2>
      <div class="alert alert-warning mb-0">Logout placeholder.</div>
    }
  </div>
</div>
